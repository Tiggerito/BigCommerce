<script data-cfasync="false">
/*
    Web Site Advantage: Tag Rocket Google Ads Form Conversion [v1.0]
    Sends a Google Ads conversion event on form submission, with labels driven by page path
    https://bigcommerce.websiteadvantage.com.au/tag-rocket/articles/tag-rocket-api/
    Copyright (C) 2026 Web Site Advantage
*/
!function(w,t){
    w[t]=w[t]||{};var T=w[t];T.i=T.i||[];if(!T.init)T.init=function(f){T.i.push(f)};

    // --- Settings (change these) ---

    // Conversion rules — properties present determine matching (all specified must match):
    //   path      → page URL contains this string
    //   pageType  → T.pageType equals this value (e.g. 'product', 'category', 'contact')
    //   selector  → the submitted form matches this CSS selector
    //   event     → gtag event name (default: 'conversion' for Google Ads; use a custom name for GA4)
    // sendTo is the Google Ads or GA4 destination: 'AW-XXXXXXXXX/label' or a GA4 stream ID
    var conversions = [
        { path: '/contact-us/',  sendTo: 'AW-XXXXXXXXX/AAAAAAAAAAA' },
        { path: '/get-a-quote/', sendTo: 'AW-XXXXXXXXX/BBBBBBBBBBB' },
        { selector: '.my-enquiry-form', sendTo: 'AW-XXXXXXXXX/CCCCCCCCCCC' },
        { pageType: 'product', selector: '.product-enquiry-form', sendTo: 'AW-XXXXXXXXX/DDDDDDDDDDD' },
        { path: '/contact-us/', event: 'contact_form_submit', sendTo: 'GoogleAnalyticsFour' }
    ];

    var debug = false;

    // End of settings --------

    var consentRequired = 'targetingAdvertising';
    var currentPath = w.location.pathname;

    // Exclude rules that can't match this page — nothing left means nothing to do
    var activeRules = [];
    for (var i = 0; i < conversions.length; i++) {
        var rule = conversions[i];
        if (rule.path && currentPath.indexOf(rule.path) === -1) continue;
        if (rule.pageType && T.pageType !== rule.pageType) continue;
        activeRules.push({ sendTo: rule.sendTo, event: rule.event || 'conversion', selector: rule.selector || null, submitted: false, fired: false });
    }

    if (!activeRules.length) return;

    T.init(function() {

        var fireRule = function(rule) {
            if (rule.fired) return;
            rule.fired = true;
            if (debug) console.log('[Tag Rocket] Google Ads form conversion firing:', rule.event, rule.sendTo);
            gtag('event', rule.event, { 'send_to': rule.sendTo });
        };

        var onConsentGranted = function() {
            for (var f = 0; f < activeRules.length; f++) {
                if (activeRules[f].submitted) fireRule(activeRules[f]);
            }
        };

        // Attach a submit listener to a single form (guard against double-attaching)
        var attachToForm = function(form) {
            if (form._trListening) return;
            form._trListening = true;
            form.addEventListener('submit', function() {
                var hasConsent = T.consent[consentRequired];
                for (var f = 0; f < activeRules.length; f++) {
                    var rule = activeRules[f];
                    // A null selector means any form on the page matches
                    if (rule.selector && !form.matches(rule.selector)) continue;
                    rule.submitted = true;
                    if (hasConsent) fireRule(rule);
                }
            });
            if (debug) console.log('[Tag Rocket] Submit listener attached to form:', form);
        };

        // Scan and attach to all forms currently in the DOM
        var attachListeners = function() {
            var forms = document.querySelectorAll('form');
            for (var j = 0; j < forms.length; j++) {
                attachToForm(forms[j]);
            }
            if (debug) console.log('[Tag Rocket] Form conversion listeners attached to', forms.length, 'form(s)');
        };

        // Watch for forms added dynamically after page load
        var observer = new MutationObserver(function(mutations) {
            for (var m = 0; m < mutations.length; m++) {
                var added = mutations[m].addedNodes;
                for (var n = 0; n < added.length; n++) {
                    var node = added[n];
                    if (node.nodeType !== 1) continue;
                    if (node.tagName === 'FORM') attachToForm(node);
                    var nested = node.querySelectorAll('form');
                    for (var k = 0; k < nested.length; k++) {
                        attachToForm(nested[k]);
                    }
                }
            }
        });

        var startObserving = function() {
            attachListeners();
            observer.observe(document.body, { childList: true, subtree: true });
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', startObserving);
        } else {
            startObserving();
        }

        // If consent was granted before a form was submitted, onConsentGranted is a no-op.
        // It becomes relevant when consent is granted after a form submission.
        if (T.consent[consentRequired]) {
            onConsentGranted();
        } else {
            T.on('ConsentChanged', function() {
                if (T.consent[consentRequired]) onConsentGranted();
            });
        }

    });

}(window,'TagRocket');
</script>
